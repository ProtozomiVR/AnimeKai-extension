# AnimeKai extension build + repo-index workflow.
#
# Runs on every push to the default branch and on manual dispatch.
# In a single job node ("build-and-publish") it:
#   1. Builds the extension APK with Gradle.
#   2. Generates the Aniyomi/AnymeX repo index.min.json (flat JSON array
#      format, matching https://github.com/mojuru/anime-repo).
#   3. Creates or resets the "repo" branch and uploads BOTH the APK (inside
#      an apk/ subdirectory) and index.min.json (at the branch root) in a
#      single commit, so the repo branch is always consistent.
name: Build and publish AnimeKai extension

on:
  push:
    branches: [ master, main ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build APK and publish to repo branch
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # Single node: checkout, setup JDK, build APK, generate index,
      # push both artifacts to the repo branch in one commit.
      # ----------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      # Defensive cleanup. The repo uses Kotlin DSL (build.gradle.kts +
      # settings.gradle.kts). If a stray Groovy build.gradle exists at the
      # root (e.g. a misplaced upload), Gradle will pick it up first and
      # fail to parse it. Remove it so the .kts files take precedence.
      - name: Validate repo layout
        run: |
          set -e
          if [ -f build.gradle ]; then
            echo "::warning::Stray build.gradle detected at repo root. Removing it (this repo uses build.gradle.kts)."
            rm -f build.gradle
          fi
          if [ ! -f build.gradle.kts ]; then
            echo "::error::build.gradle.kts is missing at the repo root. The upload was incomplete."
            exit 1
          fi
          if [ ! -f settings.gradle.kts ]; then
            echo "::error::settings.gradle.kts is missing at the repo root. The upload was incomplete."
            exit 1
          fi
          if [ ! -d src/en/animekai ]; then
            echo "::error::src/en/animekai/ is missing. The upload was incomplete."
            exit 1
          fi
          echo "Repo layout OK."

      # The repository intentionally does not ship the Gradle wrapper jar /
      # scripts. We generate them on-the-fly so the build is fully self-
      # contained inside CI and works on a fresh checkout.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5 --distribution-type bin

      - name: Build release APK
        run: |
          set -o pipefail
          # Use --info so the actual Kotlin compile errors (with file:line
          # and the offending source snippet) are printed in full. We pipe
          # through `cat` so the output is not truncated by the GitHub
          # Actions log viewer, and we explicitly dump the diagnostics
          # directory if the build fails.
          ./gradlew :animekai:assembleRelease --stacktrace --no-daemon --info 2>&1 | tee build.log
        continue-on-error: true

      - name: Dump Kotlin compile diagnostics on failure
        if: ${{ always() }}
        run: |
          if grep -q "BUILD FAILED" build.log 2>/dev/null; then
            echo "============================================================"
            echo "Kotlin compilation errors (full extract):"
            echo "============================================================"
            # Print every line that looks like a Kotlin error.
            grep -E '^e: |^w: |file://|AnimeKai|\.kt:[0-9]+:[0-9]+:|error:|Compilation error' build.log || true
            echo "============================================================"
            echo "Last 200 lines of build log:"
            echo "============================================================"
            tail -n 200 build.log || true
            exit 1
          fi
          echo "Build succeeded."

      - name: Fail job if build did not succeed
        if: ${{ always() }}
        run: |
          if ! grep -q "BUILD SUCCESSFUL" build.log 2>/dev/null; then
            echo "::error::Build did not complete successfully. See diagnostics above."
            exit 1
          fi

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find src/en/animekai/build/outputs/apk/release -name '*.apk' | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"; exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          mkdir -p artifacts/apk
          echo "final=$APK_PATH" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Verify the APK is signed. An unsigned APK will install-fail in
      # Aniyomi / AnymeX with "Installation failed: Install Cancel".
      # The signingConfigs.debug config in build.gradle should produce a
      # signed app-release.apk; this step fails the build early if for
      # any reason signing did not happen (e.g. AGP version mismatch).
      # ----------------------------------------------------------------
      - name: Verify APK is signed
        run: |
          set -e
          APK="${{ steps.apk.outputs.final }}"
          echo "Inspecting: $APK"
          # An unsigned release APK is named "*-unsigned.apk" by AGP.
          case "$APK" in
            *-unsigned.apk)
              echo "::error::APK is unsigned (filename ends in -unsigned.apk). Aniyomi/AnymeX will refuse to install it."
              echo "::error::Add 'signingConfig signingConfigs.debug' to the release buildType in build.gradle."
              exit 1
              ;;
          esac
          # Cross-check with apksigner (installed in the Android SDK build-tools).
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            if ! "$APKSIGNER" verify --print-certs "$APK" >/tmp/sig.log 2>&1; then
              echo "::error::apksigner verification failed:"
              cat /tmp/sig.log
              exit 1
            fi
            echo "Signature OK:"
            grep -E 'Verifies|Signer #1 cert|SHA-256' /tmp/sig.log | head -n 5
          else
            echo "::warning::apksigner not found in build-tools; skipping signature verification (filename check passed)."
          fi

      # ----------------------------------------------------------------
      # Compute all the metadata that BOTH the index.min.json and the
      # push step need. Centralising it here keeps the JSON generation
      # and the git commit in sync.
      # ----------------------------------------------------------------
      - name: Compute APK metadata
        id: meta
        run: |
          set -e
          LIB_VERSION="14"
          CODE="${GITHUB_RUN_NUMBER}"
          VERSION="${LIB_VERSION}.${CODE}"

          # APK filename follows the Aniyomi/AnymeX repo convention:
          #   aniyomi-<lang>.<source-name>-v<libVersion>.<code>.apk
          # which matches the layout in github.com/mojuru/anime-repo.
          APK_NAME="aniyomi-en.animekai-v${LIB_VERSION}.${CODE}.apk"

          # Aniyomi source id = first 8 bytes of MD5("<name-lower>/<lang>/<versionId>")
          # interpreted as a 64-bit big-endian int, sign bit cleared.
          # We use versionId=1 (the default, since AnimeKai does not override it).
          # Verified against github.com/mojuru/anime-repo: this algorithm
          # reproduces the IDs for AnimeOnsen (8542735178285060053) etc.
          SOURCE_ID=$(python3 -c "
          import hashlib
          h = hashlib.md5(b'animekai/en/1').digest()[:8]
          print(int.from_bytes(h, 'big', signed=False) & 0x7FFFFFFFFFFFFFFF)
          ")

          # Copy APK into artifacts/apk/ so the push step can publish it
          # under the apk/ subdirectory of the repo branch (matching the
          # reference repo layout).
          cp "${{ steps.apk.outputs.final }}" "artifacts/apk/${APK_NAME}"

          echo "name=${APK_NAME}"           >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"         >> "$GITHUB_OUTPUT"
          echo "source_id=${SOURCE_ID}"     >> "$GITHUB_OUTPUT"
          echo "apk_rel=apk/${APK_NAME}"    >> "$GITHUB_OUTPUT"
          echo "apk_local=artifacts/apk/${APK_NAME}" >> "$GITHUB_OUTPUT"

          echo "----------------------------------------------------------"
          echo " APK name     : ${APK_NAME}"
          echo " Version      : ${VERSION}"
          echo " Source ID    : ${SOURCE_ID}"
          echo " APK rel path : apk/${APK_NAME}"
          echo "----------------------------------------------------------"

      # ----------------------------------------------------------------
      # Generate index.min.json as a flat JSON array, matching the format
      # used by Aniyomi/AnymeX extension repos (see mojuru/anime-repo).
      # The APK is referenced by FILENAME ONLY; AnymeX prepends
      # "<repo-base>/apk/" automatically when downloading.
      # ----------------------------------------------------------------
      - name: Generate index.min.json
        env:
          APK_NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE_ID: ${{ steps.meta.outputs.source_id }}
          CODE: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import json, os
          entry = {
              "name": "Aniyomi: AnimeKai",
              "pkg":  "eu.kanade.tachiyomi.animeextension.en.animekai",
              "apk":  os.environ["APK_NAME"],
              "lang": "en",
              "code": int(os.environ["CODE"]),
              "version": os.environ["VERSION"],
              "nsfw": 0,
              "sources": [
                  {
                      "name":     "AnimeKai",
                      "lang":     "en",
                      "id":       os.environ["SOURCE_ID"],
                      "baseUrl":  "https://animekaitv.to"
                  }
              ]
          }
          with open("artifacts/index.min.json", "w") as f:
              json.dump([entry], f, separators=(",", ":"))
          # Sanity check: must parse as a JSON array.
          with open("artifacts/index.min.json") as f:
              parsed = json.load(f)
          assert isinstance(parsed, list) and len(parsed) == 1, "index.min.json must be a 1-element array"
          assert "sources" in parsed[0] and parsed[0]["sources"][0]["id"], "missing source id"
          print("index.min.json OK:")
          print(json.dumps(parsed, indent=2))
          PY

      # ----------------------------------------------------------------
      # Single commit to the repo branch:
      #   - index.min.json   at the branch root
      #   - apk/<name>.apk   in the apk/ subdirectory
      # A force-push resets the branch to mirror only the latest build,
      # so old APKs are removed and the repo branch stays clean.
      # ----------------------------------------------------------------
      - name: Push APK and index.min.json to repo branch (single commit)
        run: |
          set -e
          REPO_URL="https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "$REPO_URL"

          # Create or reset the repo branch from current HEAD.
          git checkout -B repo

          # Remove any previously published APKs (in apk/) and the old
          # index so the branch mirrors only the latest artifacts.
          git rm -rf --ignore-unmatch --quiet 'apk/*.apk' 'index.min.json' || true

          # Place index.min.json at the branch root and the APK inside apk/.
          mkdir -p apk
          cp artifacts/index.min.json           ./index.min.json
          cp "${{ steps.meta.outputs.apk_local }}" "./${{ steps.meta.outputs.apk_rel }}"

          git add "index.min.json" "${{ steps.meta.outputs.apk_rel }}"
          git commit -m "Publish AnimeKai v${GITHUB_RUN_NUMBER}" --no-verify
          git push --force origin repo

          echo "============================================================"
          echo "Published to repo branch:"
          echo "  index.min.json  -> https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/repo/index.min.json"
          echo "  APK             -> https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/repo/${{ steps.meta.outputs.apk_rel }}"
          echo "============================================================"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
