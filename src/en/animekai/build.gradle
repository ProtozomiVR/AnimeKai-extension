apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'eu.kanade.tachiyomi.animeextension.en.animekai'
    compileSdk 34

    defaultConfig {
        applicationId 'eu.kanade.tachiyomi.animeextension.en.animekai'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            // Aniyomi / AnymeX require extension APKs to be signed — an
            // unsigned app-release-unsigned.apk will fail to install with
            // "Installation failed: Install Cancel". We reuse the standard
            // Android debug signing config (auto-generated by AGP on first
            // build), which is exactly what keiyoushi-style extension
            // builds do. The resulting APK is named app-release.apk (not
            // -unsigned) and installs cleanly in Aniyomi / AnymeX.
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            kotlin.srcDirs = ['src']
            // res/ holds the launcher icon (mipmap-mdpi ... mipmap-xxxhdpi)
            // and any other Android resources the extension ships.
            res.srcDirs = ['res']
        }
    }
}

dependencies {
    // Aniyomi / AnymeX extension API. This artifact is published to
    // JitPack from github.com/aniyomiorg/extensions-lib and is the
    // canonical stub library used by anime extensions. The version is
    // pinned to libVersion declared in gradle.properties so the repo
    // indexer can pick the correct extension-runtime compatibility.
    compileOnly "com.github.aniyomiorg:extensions-lib:14"

    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
    implementation "org.jsoup:jsoup:1.17.2"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.okhttp3:logging-interceptor:4.12.0"
    implementation "com.google.code.gson:gson:2.10.1"
    implementation "androidx.preference:preference-ktx:1.2.1"
    implementation "androidx.core:core-ktx:1.12.0"
}
